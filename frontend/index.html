<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serverless Todo API Client</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0d0f14;
            --card-bg: rgba(22, 28, 41, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --primary-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --hover-gradient: linear-gradient(135deg, #4f46e5 0%, #9333ea 100%);
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(168, 85, 247, 0.1) 0%, transparent 40%);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }

        header {
            margin-bottom: 2rem;
            text-align: center;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            letter-spacing: -0.025em;
        }

        p.subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: var(--shadow);
            transition: var(--transition);
        }

        .card:hover {
            border-color: rgba(255, 255, 255, 0.15);
        }

        .config-section {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .config-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .input-group {
            display: flex;
            gap: 0.5rem;
        }

        input[type="text"], input[type="url"] {
            flex: 1;
            background: rgba(17, 24, 39, 0.8);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            padding: 0.75rem 1rem;
            font-size: 0.95rem;
            outline: none;
            transition: var(--transition);
        }

        input[type="text"]:focus, input[type="url"]:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        button {
            cursor: pointer;
            border: none;
            border-radius: 8px;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 0.95rem;
            padding: 0.75rem 1.25rem;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: var(--primary-gradient);
            color: #ffffff;
        }

        .btn-primary:hover {
            background: var(--hover-gradient);
            transform: translateY(-1px);
        }

        .btn-primary:active {
            transform: translateY(1px);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .todo-form {
            display: flex;
            gap: 0.5rem;
        }

        .todo-list-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .todo-list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
        }

        .todo-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .todo-list::-webkit-scrollbar {
            width: 6px;
        }
        .todo-list::-webkit-scrollbar-track {
            background: transparent;
        }
        .todo-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }
        .todo-list::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .todo-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 0.75rem 1rem;
            transition: var(--transition);
            animation: fadeIn 0.3s ease;
        }

        .todo-item:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(99, 102, 241, 0.3);
            transform: scale(1.01);
        }

        .todo-item-left {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex: 1;
        }

        .checkbox-container {
            position: relative;
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .checkbox-container input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .checkmark {
            position: absolute;
            top: 0;
            left: 0;
            height: 20px;
            width: 20px;
            background-color: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--border-color);
            border-radius: 6px;
            transition: var(--transition);
        }

        .checkbox-container:hover input ~ .checkmark {
            border-color: #6366f1;
        }

        .checkbox-container input:checked ~ .checkmark {
            background-color: var(--accent-green);
            border-color: var(--accent-green);
        }

        .checkmark:after {
            content: "";
            position: absolute;
            display: none;
            left: 6px;
            top: 2px;
            width: 5px;
            height: 10px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        .checkbox-container input:checked ~ .checkmark:after {
            display: block;
        }

        .todo-text {
            color: var(--text-primary);
            font-size: 0.95rem;
            transition: var(--transition);
            word-break: break-word;
        }

        .todo-item.completed .todo-text {
            color: var(--text-secondary);
            text-decoration: line-through;
        }

        .delete-btn {
            background: transparent;
            color: var(--text-secondary);
            padding: 0.4rem;
            border-radius: 6px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .delete-btn:hover {
            color: var(--accent-red);
            background: rgba(239, 68, 68, 0.1);
        }

        .empty-state {
            text-align: center;
            color: var(--text-secondary);
            padding: 2rem 0;
            font-size: 0.95rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            align-items: center;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: rgba(22, 28, 41, 0.95);
            border: 1px solid var(--border-color);
            padding: 0.75rem 1.25rem;
            border-radius: 10px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            z-index: 1000;
            transform: translateY(100px);
            opacity: 0;
            transition: var(--transition);
            backdrop-filter: blur(8px);
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .badge {
            background: rgba(99, 102, 241, 0.15);
            color: #a855f7;
            padding: 0.2rem 0.5rem;
            border-radius: 6px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .spinner {
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-top: 2px solid currentcolor;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <header>
        <h1>Todo Cloud Manager</h1>
        <p class="subtitle">S3 + CloudFront Static Frontend connected to AWS CDK REST API</p>
    </header>

    <div class="container">
        <section class="card config-section">
            <div class="config-title">AWS API Gateway URL</div>
            <div class="input-group">
                <input type="url" id="api-url-input" placeholder="Paste your API Endpoint here (e.g. https://xxxxxx.execute-api.us-east-1.amazonaws.com/prod/)">
                <button class="btn-primary" id="save-config-btn">Connect</button>
                <button class="btn-secondary" id="reset-config-btn">Reset</button>
            </div>
            <div style="font-size: 0.8rem; color: var(--text-secondary); display: flex; justify-content: space-between; align-items: center;">
                <span>Active Endpoint: <strong id="active-endpoint-text" style="color: #6366f1; word-break: break-all;">None</strong></span>
                <span class="badge" id="api-status-badge">Disconnected</span>
            </div>
        </section>

        <section class="card">
            <form class="todo-form" id="todo-form">
                <input type="text" id="todo-input" placeholder="Type a task and press enter..." required disabled>
                <button type="submit" class="btn-primary" id="add-btn" disabled>
                    <span>Add Task</span>
                </button>
            </form>
        </section>

        <section class="card todo-list-container">
            <div class="todo-list-header">
                <h3>My Tasks</h3>
                <span id="counter" style="color: var(--text-secondary); font-size: 0.9rem;">0 tasks</span>
            </div>

            <ul class="todo-list" id="todo-list">
                <div class="empty-state">
                    <p>Enter your API Gateway Endpoint above to load tasks.</p>
                </div>
            </ul>
        </section>
    </div>

    <div class="toast" id="toast">
        <span id="toast-icon">ℹ️</span>
        <span id="toast-message">Notification message</span>
    </div>

    <script>
        // API Base URL - Edited and deployed automatically via GitHub Actions OIDC pipeline.
        const API_BASE_URL = "https://d2l14mcp9j.execute-api.ap-southeast-1.amazonaws.com/prod";

        const apiUrlInput = document.getElementById('api-url-input');
        const saveConfigBtn = document.getElementById('save-config-btn');
        const resetConfigBtn = document.getElementById('reset-config-btn');
        const activeEndpointText = document.getElementById('active-endpoint-text');
        const apiStatusBadge = document.getElementById('api-status-badge');
        const todoForm = document.getElementById('todo-form');
        const todoInput = document.getElementById('todo-input');
        const addBtn = document.getElementById('add-btn');
        const todoList = document.getElementById('todo-list');
        const counter = document.getElementById('counter');
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toast-message');
        const toastIcon = document.getElementById('toast-icon');

        let API_URL = localStorage.getItem('todo_api_url') || API_BASE_URL;

        function initApp() {
            // Ensure trailing slash
            if (API_URL && !API_URL.endsWith('/')) {
                API_URL += '/';
            }
            apiUrlInput.value = API_URL;
            activeEndpointText.textContent = API_URL;
            enableForm(true);
            testAndLoadTodos();
        }

        saveConfigBtn.addEventListener('click', () => {
            let inputUrl = apiUrlInput.value.trim();
            if (!inputUrl) {
                showToast('API URL cannot be empty', '⚠️');
                return;
            }
            if (!inputUrl.startsWith('http://') && !inputUrl.startsWith('https://')) {
                showToast('URL must start with http:// or https://', '⚠️');
                return;
            }
            if (!inputUrl.endsWith('/')) {
                inputUrl += '/';
            }
            API_URL = inputUrl;
            localStorage.setItem('todo_api_url', API_URL);
            activeEndpointText.textContent = API_URL;
            enableForm(true);
            showToast('Endpoint configuration saved!', '✅');
            testAndLoadTodos();
        });

        resetConfigBtn.addEventListener('click', () => {
            localStorage.removeItem('todo_api_url');
            API_URL = API_BASE_URL;
            if (!API_URL.endsWith('/')) {
                API_URL += '/';
            }
            apiUrlInput.value = API_URL;
            activeEndpointText.textContent = API_URL;
            enableForm(true);
            showToast('Reset to default endpoint', '🔄');
            testAndLoadTodos();
        });

        function enableForm(enabled) {
            todoInput.disabled = !enabled;
            addBtn.disabled = !enabled;
        }

        function updateStatusBadge(status, text) {
            apiStatusBadge.textContent = text;
            if (status === 'connected') {
                apiStatusBadge.style.background = 'rgba(16, 185, 129, 0.15)';
                apiStatusBadge.style.color = 'var(--accent-green)';
            } else if (status === 'error') {
                apiStatusBadge.style.background = 'rgba(239, 68, 68, 0.15)';
                apiStatusBadge.style.color = 'var(--accent-red)';
            } else {
                apiStatusBadge.style.background = 'rgba(255, 255, 255, 0.05)';
                apiStatusBadge.style.color = 'var(--text-secondary)';
            }
        }

        function showToast(message, icon = 'ℹ️') {
            toastMessage.textContent = message;
            toastIcon.textContent = icon;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        async function testAndLoadTodos() {
            updateStatusBadge('connecting', 'Connecting...');
            todoList.innerHTML = `
                <div class="empty-state">
                    <div class="spinner"></div>
                    <p style="margin-top: 0.5rem;">Loading tasks from REST API...</p>
                </div>
            `;

            try {
                const response = await fetch(`${API_URL}todos`, { 
                    method: 'GET',
                    headers: { 'Accept': 'application/json' }
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                updateStatusBadge('connected', 'Connected');
                renderTodos(data);
            } catch (err) {
                console.error(err);
                updateStatusBadge('error', 'Error');
                todoList.innerHTML = `
                    <div class="empty-state">
                        <p style="color: var(--accent-red); font-weight: 500;">Failed to connect to API Gateway</p>
                        <p style="font-size: 0.8rem; max-width: 80%;">${err.message}</p>
                        <button class="btn-secondary" onclick="testAndLoadTodos()" style="margin-top: 0.5rem; padding: 0.4rem 1rem;">Retry</button>
                    </div>
                `;
                showToast('API connection failed. Check CORS or URL.', '❌');
            }
        }

        function renderTodos(todos) {
            todoList.innerHTML = '';
            
            if (!todos || todos.length === 0) {
                counter.textContent = '0 tasks';
                todoList.innerHTML = `
                    <div class="empty-state">
                        <p>No tasks yet. Create one above!</p>
                    </div>
                `;
                return;
            }

            counter.textContent = `${todos.length} task${todos.length === 1 ? '' : 's'}`;

            todos.forEach(todo => {
                const li = document.createElement('li');
                li.className = `todo-item ${todo.done ? 'completed' : ''}`;
                li.dataset.id = todo.id;
                
                li.innerHTML = `
                    <div class="todo-item-left">
                        <label class="checkbox-container">
                            <input type="checkbox" ${todo.done ? 'checked' : ''} onchange="toggleTodo('${todo.id}', this.checked)">
                            <span class="checkmark"></span>
                        </label>
                        <span class="todo-text">${escapeHtml(todo.title)}</span>
                    </div>
                    <button class="delete-btn" onclick="deleteTodo('${todo.id}')" title="Delete Task">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="3 6 5 6 21 6"></polyline>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                            <line x1="10" y1="11" x2="10" y2="17"></line>
                            <line x1="14" y1="11" x2="14" y2="17"></line>
                        </svg>
                    </button>
                `;
                todoList.appendChild(li);
            });
        }

        todoForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const title = todoInput.value.trim();
            if (!title) return;

            const addBtnText = addBtn.querySelector('span');
            const originalText = addBtnText.textContent;
            addBtnText.innerHTML = '<div class="spinner"></div> Creating...';
            addBtn.disabled = true;
            todoInput.disabled = true;

            try {
                const response = await fetch(`${API_URL}todos`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ title, done: false })
                });

                if (!response.ok) {
                    throw new Error('Failed to create todo');
                }

                todoInput.value = '';
                showToast('Task added successfully', '✅');
                await testAndLoadTodos();
            } catch (err) {
                console.error(err);
                showToast(`Error creating task: ${err.message}`, '❌');
            } finally {
                addBtnText.textContent = originalText;
                addBtn.disabled = false;
                todoInput.disabled = false;
                todoInput.focus();
            }
        });

        async function toggleTodo(id, checked) {
            const todoItem = document.querySelector(`.todo-item[data-id="${id}"]`);
            const checkbox = todoItem ? todoItem.querySelector('input[type="checkbox"]') : null;
            const deleteBtn = todoItem ? todoItem.querySelector('.delete-btn') : null;

            if (checkbox) checkbox.disabled = true;
            if (deleteBtn) deleteBtn.disabled = true;

            try {
                const response = await fetch(`${API_URL}todos/${id}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ done: checked })
                });

                if (!response.ok) {
                    throw new Error('Failed to update task');
                }

                if (todoItem) {
                    if (checked) {
                        todoItem.classList.add('completed');
                    } else {
                        todoItem.classList.remove('completed');
                    }
                }
                
                showToast(checked ? 'Task completed!' : 'Task active', '✓');
            } catch (err) {
                console.error(err);
                showToast(`Error updating task: ${err.message}`, '❌');
                // Revert checkbox state
                if (checkbox) checkbox.checked = !checked;
                await testAndLoadTodos();
            } finally {
                if (checkbox) checkbox.disabled = false;
                if (deleteBtn) deleteBtn.disabled = false;
            }
        }

        async function deleteTodo(id) {
            if (!confirm('Are you sure you want to delete this task?')) return;

            const todoItem = document.querySelector(`.todo-item[data-id="${id}"]`);
            const deleteBtn = todoItem ? todoItem.querySelector('.delete-btn') : null;
            const checkbox = todoItem ? todoItem.querySelector('input[type="checkbox"]') : null;
            
            if (deleteBtn) deleteBtn.disabled = true;
            if (checkbox) checkbox.disabled = true;

            try {
                const response = await fetch(`${API_URL}todos/${id}`, {
                    method: 'DELETE'
                });

                if (!response.ok) {
                    throw new Error('Failed to delete task');
                }

                showToast('Task deleted', '🗑️');
                await testAndLoadTodos();
            } catch (err) {
                console.error(err);
                showToast(`Error deleting task: ${err.message}`, '❌');
                if (deleteBtn) deleteBtn.disabled = false;
                if (checkbox) checkbox.disabled = false;
            }
        }

        function escapeHtml(text) {
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // Initialize application
        initApp();
    </script>
</body>
</html>
