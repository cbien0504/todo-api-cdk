name: Deploy Todo API

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Backend requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run Backend Unit Tests
        run: |
          PYTHONPATH=backend pytest backend/tests

      - name: Install Frontend Dependencies
        run: |
          npm ci --prefix frontend

      - name: Run Frontend Unit Tests
        run: |
          npm run test --prefix frontend

      - name: Build Frontend Application
        run: |
          npm run build --prefix frontend

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::772908588074:role/github-actions-deploy-todo-api
          aws-region: ap-southeast-1

      - name: Install CDK CLI & IaC dependencies
        run: |
          npm install -g aws-cdk
          pip install -r requirements.txt

      - name: CDK Deploy Todo Stack
        run: |
          cdk deploy TodoApiStack --require-approval never
